<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2d1b33">
<title>Russian for Grandparents</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUnVzc2lhbiBmb3IgR3JhbmRwYXJlbnRzIiwic2hvcnRfbmFtZSI6IlJ1c3NpYW4gR1AiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzJkMWIzMyIsInRoZW1lX2NvbG9yIjoiIzJkMWIzMyJ9">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232d1b33' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='50'>&#x1F476;</text></svg>">
<style>
:root {
  --bg: #2d1b33;
  --bg2: #3a2345;
  --card: #4a3055;
  --accent: #e8845c;
  --accent2: #f4a261;
  --text: #f5ede6;
  --text2: #bfa8c4;
  --success: #7ecba1;
  --error: #e07070;
  --radius: 18px;
  --shadow: 0 6px 28px rgba(0,0,0,0.35);
  --cat-greetings: #e8845c;
  --cat-questions: #7ecba1;
  --cat-family: #e09dca;
  --cat-baby: #f4a261;
  --cat-food: #7ecba1;
  --cat-actions: #6bb8d4;
  --cat-body: #e09dca;
  --cat-feelings: #e8845c;
  --cat-clothing: #d4a06b;
  --cat-house: #6bb8d4;
  --cat-outside: #7ecba1;
  --cat-praise: #f4a261;
}
.light {
  --bg: #fdf6f0;
  --bg2: #fff8f2;
  --card: #fff;
  --accent: #d4714a;
  --accent2: #e8955a;
  --text: #2a2024;
  --text2: #7a6670;
  --success: #5aab80;
  --error: #c85050;
  --shadow: 0 4px 20px rgba(90,50,30,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.3s, color 0.3s;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.light header { border-bottom: 1px solid rgba(160,100,60,0.12); }
header h1 { font-size: 19px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
header h1 span.logo { font-size: 26px; }
.header-btns { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 20px;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  transition: all 0.2s;
}
.icon-btn:hover, .icon-btn:active { color: var(--accent); background: rgba(255,255,255,0.05); }

/* Home screen grid */
.home-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 16px 20px;
}
.home-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 16px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
  text-align: center;
  border: 1.5px solid transparent;
}
.home-card:active { transform: scale(0.97); }
.home-card .hc-icon { font-size: 28px; margin-bottom: 6px; }
.home-card .hc-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.home-card .hc-progress { font-size: 12px; color: var(--text2); }
.home-card .hc-progress strong { color: var(--success); }
.home-card .hc-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.light .home-card .hc-bar { background: #e5ddd5; }
.home-card .hc-bar-fill { height: 100%; background: var(--success); border-radius: 2px; transition: width 0.3s; }
.home-card.full-width { grid-column: 1 / -1; }
.home-card.weak-words { border-color: var(--error); background: rgba(224,112,112,0.08); }
.light .home-card.weak-words { background: rgba(200,80,80,0.06); }
.home-card.weak-words.clear { opacity: 0.5; pointer-events: none; border-color: var(--success); background: rgba(126,203,161,0.06); }

/* Welcome banner */
.welcome-banner {
  grid-column: 1 / -1;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  border-radius: var(--radius);
  padding: 20px;
  color: #fff;
  text-align: center;
}
.welcome-banner h2 { font-size: 18px; margin-bottom: 6px; }
.welcome-banner p { font-size: 13px; opacity: 0.9; line-height: 1.4; }

/* Streak banner */
.streak-banner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 20px;
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
}
.streak-banner .streak-flame { font-size: 22px; }
.streak-banner .streak-count { font-size: 20px; font-weight: 800; }

/* Activity picker */
.activity-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 12px 20px 20px;
}
.activity-btn {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px 16px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
  text-align: center;
  border: 2px solid transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.activity-btn:active { transform: scale(0.97); }
.activity-btn .ab-icon { font-size: 32px; }
.activity-btn .ab-label { font-size: 16px; font-weight: 700; }
.activity-btn .ab-desc { font-size: 12px; color: var(--text2); }
.activity-btn.disabled { opacity: 0.35; pointer-events: none; }
.activity-btn .ab-progress { font-size: 11px; color: var(--text2); margin-top: 2px; }
.activity-btn.mode-done { border-color: #4a7c59; }
.activity-btn.mode-done .ab-progress { color: #4a7c59; font-weight: 600; }

/* Screen back header */
.screen-back {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: var(--bg2);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.light .screen-back { border-bottom: 1px solid rgba(160,100,60,0.08); }
.back-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  transition: all 0.2s;
}
.back-btn:active { opacity: 0.7; }
.screen-back .sb-title { font-size: 16px; font-weight: 700; }
.screen-back .sb-detail { font-size: 12px; color: var(--text2); }

.act-level-filter {
  display: flex;
  gap: 8px;
  padding: 12px 20px 4px;
}

.categories {
  display: flex;
  gap: 8px;
  padding: 16px 20px 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.categories::-webkit-scrollbar { display: none; }
.cat-btn {
  white-space: nowrap;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.12);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.light .cat-btn { border-color: #ddd5cc; }
.cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.progress-bar {
  margin: 12px 20px 4px;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.light .progress-bar { background: #e5ddd5; }
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.progress-text {
  font-size: 12px;
  color: var(--text2);
  padding: 4px 20px 12px;
}

/* Mastery bar */
.mastery-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: var(--bg2);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.light .mastery-bar { border-bottom: 1px solid rgba(160,100,60,0.08); }
.mastery-track {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.light .mastery-track { background: #e5ddd5; }
.mastery-fill {
  height: 100%;
  background: var(--success);
  border-radius: 4px;
  transition: width 0.5s ease;
}
.mastery-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  white-space: nowrap;
}
.mastery-text strong { color: var(--success); }
.mastery-detail {
  font-size: 11px;
  color: var(--text2);
  opacity: 0.8;
}

/* Flashcards */
.card-container {
  perspective: 1000px;
  padding: 20px;
  min-height: 320px;
}
.flashcard {
  position: relative;
  width: 100%;
  min-height: 300px;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.5s ease;
}
.flashcard.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  width: 100%;
  min-height: 300px;
  backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  background: var(--card);
  box-shadow: var(--shadow);
}
.card-back { transform: rotateY(180deg); }
.card-category {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.card-english {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  margin-bottom: 12px;
}
/* Phonetic romanization - PROMINENT */
.card-phonetic {
  font-size: 30px;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  color: var(--accent);
  margin-bottom: 8px;
}
/* Cyrillic - smaller underneath */
.card-cyrillic {
  font-size: 18px;
  font-weight: 500;
  text-align: center;
  line-height: 1.3;
  color: var(--text2);
  margin-bottom: 12px;
}
.card-cyrillic-row {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
}
.speak-btn {
  background: none;
  border: 1.5px solid rgba(255,255,255,0.15);
  color: var(--text2);
  font-size: 20px;
  cursor: pointer;
  padding: 6px 8px;
  border-radius: 10px;
  transition: all 0.2s;
  flex-shrink: 0;
  line-height: 1;
}
.light .speak-btn { border-color: #ddd5cc; }
.speak-btn:hover, .speak-btn:active { color: var(--accent); border-color: var(--accent); }
.card-context {
  font-size: 12px;
  color: var(--text2);
  text-align: center;
  margin-top: 12px;
  opacity: 0.7;
  font-style: italic;
}
.card-hint {
  font-size: 13px;
  color: var(--text2);
  margin-top: 20px;
  opacity: 0.5;
}
.card-nav {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 0 20px 20px;
}
.nav-btn {
  flex: 1;
  max-width: 160px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow);
}
.nav-btn:active { transform: scale(0.96); }
.nav-btn.primary { background: var(--accent); color: #fff; }

/* Quiz */
.quiz-container { padding: 20px; }
.quiz-question {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.quiz-prompt-label {
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.quiz-prompt {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.3;
}
.quiz-prompt-phonetic {
  font-size: 16px;
  color: var(--text2);
  margin-top: 8px;
  font-style: italic;
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  padding: 16px 20px;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  background: var(--card);
  color: var(--text);
  font-size: 17px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  box-shadow: var(--shadow);
}
.light .quiz-option { border-color: #e0d8d0; }
.quiz-option:active { transform: scale(0.98); }
.quiz-option.correct {
  border-color: var(--success);
  background: rgba(126, 203, 161, 0.15);
  color: var(--success);
}
.quiz-option.wrong {
  border-color: var(--error);
  background: rgba(224, 112, 112, 0.15);
  color: var(--error);
}
.quiz-option.disabled { pointer-events: none; }
.quiz-option .opt-phonetic {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
  font-style: italic;
}

.quiz-score {
  display: flex;
  justify-content: space-around;
  padding: 12px 20px;
  margin-bottom: 8px;
}
.score-item { text-align: center; }
.score-num { font-size: 28px; font-weight: 700; }
.score-num.green { color: var(--success); }
.score-num.red { color: var(--error); }
.score-label { font-size: 12px; color: var(--text2); }

.quiz-direction {
  display: flex;
  gap: 8px;
  padding: 0 20px 12px;
}
.dir-btn {
  flex: 1;
  padding: 8px;
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.light .dir-btn { border-color: #ddd5cc; }
.dir-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.screen { display: none; }
.screen.active { display: block; }

/* Listen mode speaker */
.listen-speaker {
  font-size: 64px;
  cursor: pointer;
  padding: 16px;
  transition: transform 0.2s;
  display: inline-block;
}
.listen-speaker:active { transform: scale(0.9); }

/* Match game */
.match-score {
  display: flex;
  justify-content: space-around;
  padding: 12px 20px;
}
.match-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 12px 20px 20px;
}
.match-tile {
  padding: 14px 10px;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  background: var(--card);
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  box-shadow: var(--shadow);
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  word-break: break-word;
  line-height: 1.2;
  -webkit-user-select: none;
  user-select: none;
}
.light .match-tile { border-color: #e0d8d0; }
.match-tile:active { transform: scale(0.96); }
.match-tile.selected {
  border-color: var(--accent);
  background: rgba(232, 132, 92, 0.15);
}
.match-tile.correct {
  border-color: var(--success);
  background: rgba(126, 203, 161, 0.18);
  color: var(--success);
}
.match-tile.wrong {
  border-color: var(--error);
  background: rgba(224, 112, 112, 0.18);
  color: var(--error);
}
.match-tile.matched {
  opacity: 0;
  transform: scale(0.7);
  pointer-events: none;
  transition: all 0.4s ease;
}
.match-tile .tile-lang {
  display: block;
  font-size: 10px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.match-tile .tile-phonetic {
  display: block;
  font-size: 11px;
  color: var(--text2);
  margin-top: 3px;
  font-style: italic;
}
.match-done {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
  font-size: 17px;
}
.match-done .nav-btn { margin-top: 16px; }

/* Typing mode */
.typing-container { padding: 20px; }
.typing-prompt {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.typing-prompt-label {
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.typing-prompt-text {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.3;
}
.typing-hint {
  font-size: 13px;
  color: var(--text2);
  margin-top: 8px;
  font-style: italic;
}
.typing-input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.typing-input {
  flex: 1;
  padding: 14px 16px;
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  background: var(--card);
  color: var(--text);
  font-size: 17px;
  font-weight: 500;
  box-shadow: var(--shadow);
  outline: none;
  transition: border-color 0.2s;
}
.light .typing-input { border-color: #e0d8d0; }
.typing-input:focus { border-color: var(--accent); }
.typing-input.correct { border-color: var(--success); background: rgba(126,203,161,0.1); }
.typing-input.wrong { border-color: var(--error); background: rgba(224,112,112,0.1); }
.typing-check-btn {
  padding: 14px 24px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.typing-check-btn:active { transform: scale(0.96); }
.typing-check-btn:disabled { opacity: 0.4; pointer-events: none; }
.typing-result {
  text-align: center;
  padding: 12px;
  font-size: 17px;
  font-weight: 600;
  min-height: 44px;
}
.typing-result.correct { color: var(--success); }
.typing-result.wrong { color: var(--error); }
.typing-correct-answer {
  text-align: center;
  padding: 0 20px 8px;
  color: var(--text2);
  font-size: 15px;
}

/* Sentence builder */
.builder-prompt {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  box-shadow: var(--shadow);
  margin: 0 20px 16px;
}
.builder-prompt-label {
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.builder-prompt-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.4;
}
.builder-assembled {
  min-height: 52px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 20px;
  align-items: center;
}
.builder-assembled-word {
  padding: 8px 14px;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.builder-assembled-word:active { transform: scale(0.94); }
.builder-placeholder {
  color: var(--text2);
  font-size: 14px;
  font-style: italic;
}
.builder-tiles {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 20px 20px;
}
.builder-tile {
  padding: 10px 16px;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  background: var(--card);
  color: var(--text);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.light .builder-tile { border-color: #e0d8d0; }
.builder-tile:active { transform: scale(0.96); }
.builder-tile.used {
  opacity: 0.3;
  pointer-events: none;
}
.builder-result {
  text-align: center;
  padding: 16px 20px;
  font-size: 17px;
  font-weight: 600;
}
.builder-result.correct { color: var(--success); }
.builder-result.wrong { color: var(--error); }
.builder-correct-answer {
  text-align: center;
  padding: 0 20px 12px;
  color: var(--text2);

function getFiltered(cat) {
  return cat === 'All' ? [...WORDS] : WORDS.filter(w => w.cat === cat);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function $(id) { return document.getElementById(id); }

// ============================================================
// TTS — Russian voice
// ============================================================
let ruVoice = null;
function findRuVoice() {
  const voices = speechSynthesis.getVoices();
  ruVoice = voices.find(v => v.lang === 'ru-RU')
    || voices.find(v => v.lang.startsWith('ru'))
    || null;
}
if (window.speechSynthesis) {
  findRuVoice();
  speechSynthesis.addEventListener('voiceschanged', findRuVoice);
}

function speak(text) {
  if (window.speechSynthesis) speechSynthesis.cancel();
  if (!window.speechSynthesis) return null;
  if (!ruVoice) findRuVoice();
  const u = new SpeechSynthesisUtterance(text);
  if (ruVoice) { u.voice = ruVoice; u.lang = ruVoice.lang; }
  else { u.lang = 'ru-RU'; }
  u.rate = 0.8;
  speechSynthesis.speak(u);
  return u;
}

function saveMastery(ruText, correct, mode) {
  const m = getMastery();
  if (!m[ruText]) m[ruText] = { streak: 0 };
  if (correct) { m[ruText].streak = (m[ruText].streak || 0) + 1; }
  else { m[ruText].streak = 0; }
  if (mode && correct) {
    if (!m[ruText].modes) m[ruText].modes = {};
    m[ruText].modes[mode] = (m[ruText].modes[mode] || 0) + 1;
  }
  localStorage.setItem('ru-mastery', JSON.stringify(m));
  updateStreak();
}

function getStreak() {
  try { return JSON.parse(localStorage.getItem('ru-streak') || '{"current":0,"lastDate":""}'); }
  catch(e) { return { current: 0, lastDate: '' }; }
}

function updateStreak() {
  const s = getStreak();
  const today = new Date().toISOString().slice(0, 10);
  if (s.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (s.lastDate === yesterday) { s.current++; }
  else { s.current = 1; }
  s.lastDate = today;
  localStorage.setItem('ru-streak', JSON.stringify(s));
}

function getCatProgress(cat) {
  const words = getFiltered(cat);
  if (!words.length) return { known: 0, total: 0, pct: 0 };
  const m = getMastery();
  const known = words.filter(w => m[w.ru] && m[w.ru].streak >= 3).length;
  return { known, total: words.length, pct: Math.round((known / words.length) * 100) };
}

function getModeDone(cat, mode) {
  const words = getFiltered(cat);
  if (!words.length) return 0;
  const m = getMastery();
  return words.filter(w => m[w.ru] && m[w.ru].modes && m[w.ru].modes[mode] >= 2).length;
}

function renderActivities() {
  const catLabel = state.currentCat === 'All' ? 'All Words' : state.currentCat;
  const catIcon = state.currentCat !== 'All' ? (CAT_ICONS[state.currentCat] || '') + ' ' : '';
  $('act-cat-title').innerHTML = catIcon + catLabel;

  // Hide level filter (not needed for this simpler app)
  $('act-levels').innerHTML = '';

  const actGrid = $('activity-grid');
  const currentItems = getFiltered(state.currentCat).length;

  // Check if there are multi-word items for builder
  const buildable = getFiltered(state.currentCat).filter(w => w.ru.split(/\s+/).length >= 2);
  const hasBuildable = buildable.length > 0;

  const modeMap = {
    match: { icon: '\u{1F9E9}', label: 'Match', desc: 'Pair the words', need: 4 },
    quiz: { icon: '\u{1F3AF}', label: 'Quiz', desc: 'Multiple choice', need: 4 },
    typing: { icon: '\u2328', label: 'Type', desc: 'Type the phonetic', need: 1 },
    builder: { icon: '\u{1F527}', label: 'Build', desc: 'Build the phrase', need: 0, buildable: true },
    flashcards: { icon: '\u{1F0CF}', label: 'Cards', desc: 'Flashcards', need: 1, passive: true }
  };
  const modeOrder = ['match', 'quiz', 'typing', 'builder', 'flashcards'];

  actGrid.innerHTML = modeOrder.map(mode => {
    const m = modeMap[mode];
    const disabled = m.buildable ? !hasBuildable : (m.need > 0 && currentItems < m.need);
    const done = m.passive ? null : getModeDone(state.currentCat, mode);
    const total = m.buildable ? buildable.length : currentItems;
    const allDone = done !== null && total > 0 && done >= total;
    const progressText = done !== null && total > 0 ? `${done}/${total} done` : '';

    return `<div class="activity-btn${disabled ? ' disabled' : ''}${allDone ? ' mode-done' : ''}" data-mode="${mode}">
      <div class="ab-icon">${m.icon}</div>
      <div class="ab-label">${m.label}</div>
      <div class="ab-desc">${m.desc}</div>
      ${progressText ? `<div class="ab-progress">${allDone ? '\u2713 ' : ''}${progressText}</div>` : ''}
    </div>`;
  }).join('\n');

  actGrid.querySelectorAll('.activity-btn:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => startActivity(btn.dataset.mode));
  });
}

function getActivityDetail() {
  const prog = getCatProgress(state.currentCat);
  return prog.known + '/' + prog.total + ' learned';
}

function startActivity(mode) {
  const catLabel = state.currentCat === 'All' ? 'All Words' : state.currentCat;
  const detail = getActivityDetail();

  if (mode === 'quiz') {
    $('qz-screen-title').textContent = 'Quiz \u2014 ' + catLabel;
    $('qz-screen-detail').textContent = detail;
    initQuiz();
    showScreen('quiz-screen');
  } else if (mode === 'match') {
    $('mt-screen-title').textContent = 'Match \u2014 ' + catLabel;
    $('mt-screen-detail').textContent = detail;
    initMatch();
    showScreen('match-screen');
  } else if (mode === 'builder') {
    $('bl-screen-title').textContent = 'Build \u2014 ' + catLabel;
    $('bl-screen-detail').textContent = detail;
    initBuilder();
    showScreen('builder-screen');
  } else if (mode === 'typing') {
    $('tp-screen-title').textContent = 'Type \u2014 ' + catLabel;
    $('tp-screen-detail').textContent = detail;
    initTyping();
    showScreen('typing-screen');
  } else if (mode === 'flashcards') {
    $('fc-screen-title').textContent = 'Cards \u2014 ' + catLabel;
    $('fc-screen-detail').textContent = detail;
    initFlashcards();
    showScreen('flashcards-screen');
  }
}

function goBack() {
  const screen = state.currentScreen;
  if (['quiz', 'match', 'builder', 'flashcards', 'typing'].includes(screen)) {
    renderActivities();
    showScreen('activity-screen');
  } else if (screen === 'cyrillic') {
    renderHome();
    showScreen('home-screen');
  } else {
    renderHome();
    showScreen('home-screen');
  }
}

function startWeakWordsQuiz() {
  const m = getMastery();
  const weak = WORDS.filter(w => {
    const streak = (m[w.ru] && m[w.ru].streak) || 0;
    return streak <= 1 && m[w.ru] !== undefined;

  if (!weak.length) return;

  state.currentCat = 'All';
  state.qzCustomQueue = shuffle(weak.slice());
  $('qz-screen-title').textContent = 'Quiz \u2014 Words to Review';

$('flashcard').addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
$('flashcard').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 60) {
    if (dx < 0) $('nextBtn').click();
    else $('prevBtn').click();
  }
});

  if (state.currentScreen === 'flashcards') {
    if (e.key === 'ArrowRight') $('nextBtn').click();

    if (e.key === ' ') { e.preventDefault(); $('flashcard').click(); }
  }
});

// ============================================================
// QUIZ
// ============================================================
function buildQueue() {
  if (state.qzCustomQueue && state.qzCustomQueue.length) {
    state.qzQueue = state.qzCustomQueue;
    state.qzCustomQueue = null;
    return;
  }
  const filtered = getFiltered(state.currentCat);
  const m = getMastery();
  const weakest = [], learning = [], known = [];
  filtered.forEach(w => {
    const streak = (m[w.ru] && m[w.ru].streak) || 0;
    if (streak === 0) weakest.push(w);
    else if (streak < 3) learning.push(w);
    else known.push(w);
  });
  state.qzQueue = [...shuffle(weakest), ...shuffle(learning), ...shuffle(known)];
}

function renderQuiz() {
  const container = $('quiz-content');
  if (!state.qzQueue.length) buildQueue();
  if (!state.qzQueue.length) {
    container.innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px;">No words for this category.</p>';
    return;
  }

  const card = state.qzQueue[0];
  const isListen = state.qzDirection === 'listen';
  const isEnRu = state.qzDirection === 'en-ru';

  // In EN->RU mode: show English, pick the Russian (phonetic + cyrillic)
  // In RU->EN mode: show Russian (phonetic + cyrillic), pick English
  // In Listen mode: hear Russian, pick English

  let promptHTML, optionsFn;

  if (isListen) {
    promptHTML = `<div class="quiz-prompt-label">Listen &amp; choose</div>
      <div class="listen-speaker" id="qz-replay">&#128264;</div>`;
  } else if (isEnRu) {
    promptHTML = `<div class="quiz-prompt-label">What is this in Russian?</div>
      <div class="quiz-prompt">${card.en}</div>`;
  } else {
    promptHTML = `<div class="quiz-prompt-label">What does this mean?</div>
      <div class="quiz-prompt" style="color:var(--accent)">${card.pron}</div>
      <div class="quiz-prompt-phonetic">${card.ru}</div>`;
  }

  let pool = getFiltered(state.currentCat).filter(w => w !== card);
  if (pool.length < 3) pool = WORDS.filter(w => w !== card);
  const wrongPool = shuffle(pool).slice(0, 3);

  let options;
  if (isEnRu) {
    // Options show phonetic + cyrillic
    options = shuffle([
      { text: card.pron, sub: card.ru, correct: true },
      ...wrongPool.map(w => ({ text: w.pron, sub: w.ru, correct: false }))
    ]);
  } else {
    // Options show English
    options = shuffle([
      { text: card.en, sub: '', correct: true },
      ...wrongPool.map(w => ({ text: w.en, sub: '', correct: false }))
    ]);
  }

  container.innerHTML = `
    <div class="quiz-question">${promptHTML}</div>
    <div class="quiz-options">
      ${options.map((o, i) => `<button class="quiz-option" data-idx="${i}">${o.text}${o.sub ? '<div class="opt-phonetic">' + o.sub + '</div>' : ''}</button>`).join('')}
    </div>
  `;

  if (isListen) {
    setTimeout(() => speak(card.ru), 300);
    const replay = $('qz-replay');
    if (replay) replay.addEventListener('click', () => speak(card.ru));
  }

  state.qzAnswered = false;

  container.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      if (state.qzAnswered) return;
      state.qzAnswered = true;
      state.qzTotal++;

      container.querySelectorAll('.quiz-option').forEach(b => b.classList.add('disabled'));

      const isCorrect = options[i].correct;
      if (isCorrect) {
        btn.classList.add('correct');
        state.qzCorrect++;
      } else {
        btn.classList.add('wrong');
        container.querySelectorAll('.quiz-option').forEach((b, j) => {
          if (options[j].correct) b.classList.add('correct');
        });
        state.qzWrong++;
      }

      saveMastery(card.ru, isCorrect, 'quiz');
      updateMasteryBar();

      $('score-correct').textContent = state.qzCorrect;
      $('score-wrong').textContent = state.qzWrong;
      $('score-total').textContent = state.qzTotal;

      const total = getFiltered(state.currentCat).length;
      $('qz-progress').style.width = Math.round((state.qzTotal / total) * 100) + '%';

      const utterance = speak(card.ru);
      let timerDone = false, speechDone = !utterance;
      function tryAdvance() {
        if (timerDone && speechDone) {
          state.qzQueue.shift();
          if (!state.qzQueue.length) buildQueue();
          renderQuiz();
        }
      }
      setTimeout(() => { timerDone = true; tryAdvance(); }, 1200);
      if (utterance) {
        utterance.onend = () => { speechDone = true; tryAdvance(); };
        utterance.onerror = () => { speechDone = true; tryAdvance(); };
      }
    });
  });
}

function initQuiz() {
  state.qzCorrect = 0;
  state.qzWrong = 0;
  state.qzTotal = 0;
  state.qzMissed = [];
  $('score-correct').textContent = '0';
  $('score-wrong').textContent = '0';
  $('score-total').textContent = '0';
  $('qz-progress').style.width = '0%';
  $('qz-direction').querySelectorAll('.dir-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.dir === state.qzDirection);
    btn.onclick = () => {
      state.qzDirection = btn.dataset.dir;
      $('qz-direction').querySelectorAll('.dir-btn').forEach(b => b.classList.toggle('active', b.dataset.dir === state.qzDirection));
      buildQueue();
      renderQuiz();
    };
  });
  buildQueue();
  renderQuiz();
}

// ============================================================
// MATCH GAME
// ============================================================
let matchState = {
  pool: [],
  round: [],
  selected: null,
  matched: 0,
  mistakes: 0,
  busy: false
};

function buildMatchRound() {
  if (!matchState.pool.length) {
    matchState.pool = shuffle(getFiltered(state.currentCat).slice());
  }
  const pairs = matchState.pool.splice(0, 6);
  if (!pairs.length) {
    $('match-grid').innerHTML = '';
    $('match-done').style.display = 'block';
    $('match-done').querySelector('p').textContent = 'All done! Try another category.';
    $('match-next').textContent = 'Restart';
    return;
  }
  matchState.round = pairs;
  matchState.selected = null;
  $('match-done').style.display = 'none';

  const tiles = [];
  pairs.forEach((w, i) => {
    tiles.push({ id: i, lang: 'en', text: w.en, pairId: i });
    // Show phonetic as the Russian tile (easier for grandparents)
    tiles.push({ id: i, lang: 'ru', text: w.pron, cyrillic: w.ru, pairId: i, ruText: w.ru });
  });
  shuffle(tiles);

  const grid = $('match-grid');
  grid.innerHTML = '';
  tiles.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'match-tile';
    if (t.lang === 'ru') {
      btn.innerHTML = `<div><span class="tile-lang">RU</span>${t.text}<span class="tile-phonetic">${t.cyrillic}</span></div>`;
    } else {
      btn.innerHTML = `<div><span class="tile-lang">EN</span>${t.text}</div>`;
    }
    btn.dataset.pairId = t.pairId;
    btn.dataset.lang = t.lang;
    btn.addEventListener('click', () => handleMatchTap(btn, t));
    grid.appendChild(btn);
  });
}

function handleMatchTap(btn, tile) {
  if (matchState.busy) return;
  if (btn.classList.contains('matched') || btn.classList.contains('correct')) return;

  if (matchState.selected && matchState.selected.btn === btn) {
    btn.classList.remove('selected');
    matchState.selected = null;
    return;
  }

  if (!matchState.selected) {
    btn.classList.add('selected');
    matchState.selected = { btn, tile };
    if (tile.lang === 'ru' && tile.ruText) speak(tile.ruText);
    return;
  }

  const first = matchState.selected;
  matchState.busy = true;

  if (first.tile.lang === tile.lang) {
    // Same language — just switch selection
    first.btn.classList.remove('selected');
    btn.classList.add('selected');
    matchState.selected = { btn, tile };
    matchState.busy = false;
    if (tile.lang === 'ru' && tile.ruText) speak(tile.ruText);
    return;
  }

  // Different languages — check match
  if (first.tile.pairId === tile.pairId) {
    // Correct match
    first.btn.classList.add('correct');
    btn.classList.add('correct');
    matchState.matched++;
    $('mt-matched').textContent = matchState.matched;

    const ruTile = tile.lang === 'ru' ? tile : first.tile;
    if (ruTile.ruText) speak(ruTile.ruText);
    saveMastery(matchState.round[tile.pairId].ru, true, 'match');
    updateMasteryBar();

    setTimeout(() => {
      first.btn.classList.add('matched');
      btn.classList.add('matched');
      matchState.selected = null;
      matchState.busy = false;

      // Check if round complete
      const remaining = document.querySelectorAll('#match-grid .match-tile:not(.matched)');
      if (remaining.length === 0) {
        $('match-done').style.display = 'block';
      }
    }, 600);
  } else {
    // Wrong match
    first.btn.classList.add('wrong');
    btn.classList.add('wrong');
    matchState.mistakes++;
    $('mt-mistakes').textContent = matchState.mistakes;
    saveMastery(matchState.round[first.tile.pairId].ru, false, 'match');

    setTimeout(() => {
      first.btn.classList.remove('wrong', 'selected');
      btn.classList.remove('wrong');
      matchState.selected = null;
      matchState.busy = false;
    }, 700);
  }
}

function initMatch() {
  matchState = { pool: [], round: [], selected: null, matched: 0, mistakes: 0, busy: false };
  $('mt-matched').textContent = '0';
  $('mt-mistakes').textContent = '0';
  buildMatchRound();
}

$('match-next').addEventListener('click', () => {
  $('match-done').style.display = 'none';
  if (!matchState.pool.length) {
    matchState.pool = shuffle(getFiltered(state.currentCat).slice());
  }
  buildMatchRound();
});

// ============================================================
// TYPING MODE — accepts romanized (phonetic) input
// ============================================================
let typingState = {
  queue: [],
  correct: 0,
  wrong: 0,
  total: 0,
  answered: false
};

function buildTypingQueue() {
  const filtered = getFiltered(state.currentCat);
  const m = getMastery();
  const weakest = [], learning = [], known = [];
  filtered.forEach(w => {
    const streak = (m[w.ru] && m[w.ru].streak) || 0;
    if (streak === 0) weakest.push(w);
    else if (streak < 3) learning.push(w);
    else known.push(w);
  });
  typingState.queue = [...shuffle(weakest), ...shuffle(learning), ...shuffle(known)];
}

function normalizePhonetic(str) {
  return str.toLowerCase()
    .replace(/[^a-z\s]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function renderTyping() {
  const container = $('typing-content');
  if (!typingState.queue.length) buildTypingQueue();
  if (!typingState.queue.length) {
    container.innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px;">No words for this category.</p>';
    return;
  }

  const card = typingState.queue[0];
  typingState.answered = false;

  container.innerHTML = `
    <div class="typing-prompt">
      <div class="typing-prompt-label">Type the pronunciation for:</div>
      <div class="typing-prompt-text">${card.en}</div>
      <div class="typing-hint">Type how it sounds, e.g. "${card.pron.split(' ')[0].substring(0, 3).toLowerCase()}..."</div>
    </div>
    <div class="typing-input-row">
      <input type="text" class="typing-input" id="typing-input" placeholder="Type phonetic..." autocomplete="off" autocapitalize="off" spellcheck="false">
      <button class="typing-check-btn" id="typing-check">Check</button>
    </div>
    <div class="typing-result" id="typing-result"></div>
    <div class="typing-correct-answer" id="typing-answer"></div>
  `;

  const input = $('typing-input');
  const checkBtn = $('typing-check');

  function check() {
    if (typingState.answered) {
      // Next question
      typingState.queue.shift();
      if (!typingState.queue.length) buildTypingQueue();
      renderTyping();
      return;
    }

    const val = input.value.trim();
    if (!val) return;

    typingState.answered = true;
    typingState.total++;

    const normalized = normalizePhonetic(val);
    const correct = normalizePhonetic(card.pron);

    // Check if close enough (allow some flexibility)
    const isCorrect = normalized === correct
      || normalized.replace(/\s/g, '') === correct.replace(/\s/g, '')
      || levenshtein(normalized, correct) <= Math.max(2, Math.floor(correct.length * 0.25));

    if (isCorrect) {
      input.classList.add('correct');
      $('typing-result').textContent = 'Correct!';
      $('typing-result').className = 'typing-result correct';
      typingState.correct++;
    } else {
      input.classList.add('wrong');
      $('typing-result').textContent = 'Not quite!';
      $('typing-result').className = 'typing-result wrong';
      $('typing-answer').innerHTML = `Answer: <strong>${card.pron}</strong> (${card.ru})`;
      typingState.wrong++;
    }

    saveMastery(card.ru, isCorrect, 'typing');
    updateMasteryBar();
    speak(card.ru);

    $('tp-correct').textContent = typingState.correct;
    $('tp-wrong').textContent = typingState.wrong;
    $('tp-total').textContent = typingState.total;

    const total = getFiltered(state.currentCat).length;
    $('tp-progress').style.width = Math.round((typingState.total / total) * 100) + '%';

    checkBtn.textContent = 'Next \u2192';
  }

  checkBtn.addEventListener('click', check);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') check();
  });

  setTimeout(() => input.focus(), 100);
}

function initTyping() {
  typingState = { queue: [], correct: 0, wrong: 0, total: 0, answered: false };
  $('tp-correct').textContent = '0';
  $('tp-wrong').textContent = '0';
  $('tp-total').textContent = '0';
  $('tp-progress').style.width = '0%';
  buildTypingQueue();
  renderTyping();
}

// Simple Levenshtein distance for fuzzy matching
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

          allTiles.forEach(t => {
            if (!builderState.assembled.includes(t.dataset.word) || countInArr(builderState.assembled, t.dataset.word) < countUsed(content, t.dataset.word)) {
              // Simpler: just re-mark all
            }
          });
          // Re-mark used status
          const usedCounts = {};
          builderState.assembled.forEach(w => { usedCounts[w] = (usedCounts[w] || 0) + 1; });
          const seenCounts = {};
          allTiles.forEach(t => {
            const w = t.dataset.word;
            seenCounts[w] = (seenCounts[w] || 0) + 1;
            t.classList.toggle('used', seenCounts[w] <= (usedCounts[w] || 0));
          });

          // Re-render assembled
          if (builderState.assembled.length === 0) {
            assembled.innerHTML = '<span class="builder-placeholder">Tap words below to build the phrase...</span>';

function countInArr(arr, val) { return arr.filter(x => x === val).length; }

function checkBuilder(card, words) {
  builderState.answered = true;
  builderState.total++;

let cyrState = {

  group: 'all',
  browseIndex: 0,

  qzType: 'letter-to-sound', // or 'sound-to-letter'
  qzQueue: [],

function getCyrFiltered() {

function openCyrillicScreen() {

// --- BROWSE ---
function renderCyrBrowse() {
  const content = $('cyr-content');
  const filtered = getCyrFiltered();
  if (!filtered.length) {
    content.innerHTML = '<p style="text-align:center;color:var(--text2);padding:40px;">No letters in this group.</p>';

  }
  const idx = cyrState.browseIndex % filtered.length;

  const upperLetter = c.letter.split(' ')[0];

  content.innerHTML = `
    <div class="cyr-group-tabs" id="cyr-group-tabs">
      ${Object.entries(CYR_GROUP_LABELS).map(([key, label]) =>
        `<button class="cyr-group-btn${cyrState.group === key ? ' active' : ''}" data-group="${key}">${label} ${key === 'all' ? '(33)' : '(' + CYRILLIC.filter(l => key === 'all' || l.group === key).length + ')'}</button>`
      ).join('')}

    <div class="cyr-letter-card">
      <div class="cyr-letter-big">${c.letter}</div>
      <div class="cyr-letter-sound">"${c.sound}"</div>
      <div class="cyr-letter-like">${c.like}</div>
      <div class="cyr-letter-group ${c.group}">${CYR_GROUP_LABELS[c.group] || c.group}</div>
      <div style="margin-top:16px">
        <button class="speak-btn" id="cyr-speak" aria-label="Listen" style="font-size:24px;padding:10px 14px">&#128264;</button>
      </div>
    </div>
    <div class="cyr-browse-nav">
      <button class="nav-btn" id="cyr-prev">&#8592; Prev</button>
      <div class="cyr-counter">${idx + 1} / ${filtered.length}</div>
      <button class="nav-btn primary" id="cyr-next">Next &#8594;</button>
    </div>
  `;

  // Group tab clicks
  content.querySelectorAll('.cyr-group-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      cyrState.group = btn.dataset.group;
      cyrState.browseIndex = 0;
      renderCyrBrowse();
    });
  });

  // Nav
  $('cyr-prev').addEventListener('click', () => {
    const f = getCyrFiltered();
    cyrState.browseIndex = (cyrState.browseIndex - 1 + f.length) % f.length;
    renderCyrBrowse();
  });
  $('cyr-next').addEventListener('click', () => {

    cyrState.browseIndex = (cyrState.browseIndex + 1) % f.length;

  // TTS — speak the letter
  $('cyr-speak').addEventListener('click', () => {

  });

  const card = content.querySelector('.cyr-letter-card');
  let startX = 0;
  card.addEventListener('touchstart', e => { startX = e.changedTouches[0].screenX; }, { passive: true });
  card.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - startX;
    if (Math.abs(dx) > 60) {
      if (dx < 0) $('cyr-next').click();
      else $('cyr-prev').click();
    }
  });
}

// --- QUIZ ---
function buildCyrQuizQueue() {
  cyrState.qzQueue = shuffle(CYRILLIC.filter(c => c.sound !== '—').slice());
}

function renderCyrQuiz() {
  const content = $('cyr-content');

  if (!cyrState.qzQueue || !cyrState.qzQueue.length) {
    cyrState.qzCorrect = 0;
    cyrState.qzWrong = 0;
    cyrState.qzTotal = 0;
    cyrState.qzType = 'letter-to-sound';
    buildCyrQuizQueue();
  }

  const card = cyrState.qzQueue[0];
  cyrState.qzAnswered = false;

  const isLetterToSound = cyrState.qzType === 'letter-to-sound';

  // Build wrong options
  const pool = CYRILLIC.filter(c => c !== card && c.sound !== '—');
  const wrongs = shuffle(pool).slice(0, 3);

  let options;
  if (isLetterToSound) {
    options = shuffle([
      { text: `"${card.sound}" — ${card.like}`, correct: true },
      ...wrongs.map(w => ({ text: `"${w.sound}" — ${w.like}`, correct: false }))
    ]);
  } else {
    options = shuffle([
      { text: card.letter, correct: true },
      ...wrongs.map(w => ({ text: w.letter, correct: false }))
    ]);
  }

  content.innerHTML = `
    <div class="quiz-direction" style="padding:12px 20px 8px">
      <button class="dir-btn${isLetterToSound ? ' active' : ''}" data-cqdir="letter-to-sound">Letter &#8594; Sound</button>
      <button class="dir-btn${!isLetterToSound ? ' active' : ''}" data-cqdir="sound-to-letter">Sound &#8594; Letter</button>
    </div>
    <div class="quiz-score">
      <div class="score-item"><div class="score-num green" id="cyr-qz-correct">${cyrState.qzCorrect}</div><div class="score-label">Correct</div></div>
      <div class="score-item"><div class="score-num" id="cyr-qz-total">${cyrState.qzTotal}</div><div class="score-label">Total</div></div>
      <div class="score-item"><div class="score-num red" id="cyr-qz-wrong">${cyrState.qzWrong}</div><div class="score-label">Wrong</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="cyr-qz-progress" style="width:${Math.round((cyrState.qzTotal / CYRILLIC.filter(c=>c.sound!=='—').length)*100)}%"></div></div>
    <div class="cyr-quiz-container">
      <div class="cyr-quiz-prompt">
        <div class="cyr-quiz-label">${isLetterToSound ? 'What sound does this letter make?' : 'Which letter makes this sound?'}</div>
        ${isLetterToSound
          ? `<div class="cyr-quiz-letter">${card.letter}</div>`
          : `<div class="cyr-letter-sound" style="font-size:32px">"${card.sound}"</div><div style="color:var(--text2);font-size:14px">${card.like}</div>`
        }
      </div>
      <div class="quiz-options">
        ${options.map((o, i) => `<button class="quiz-option" data-idx="${i}"${!isLetterToSound ? ' style="font-size:22px;text-align:center"' : ''}>${o.text}</button>`).join('')}
      </div>
    </div>
  `;

  // Direction buttons
  content.querySelectorAll('.dir-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      cyrState.qzType = btn.dataset.cqdir;
      cyrState.qzQueue = [];
      cyrState.qzCorrect = 0;
      cyrState.qzWrong = 0;
      cyrState.qzTotal = 0;
      renderCyrQuiz();
    });
  });

  // Option clicks
  content.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      if (cyrState.qzAnswered) return;
      cyrState.qzAnswered = true;
      cyrState.qzTotal++;

      content.querySelectorAll('.quiz-option').forEach(b => b.classList.add('disabled'));

      if (options[i].correct) {
        btn.classList.add('correct');
        cyrState.qzCorrect++;
      } else {
        btn.classList.add('wrong');
        content.querySelectorAll('.quiz-option').forEach((b, j) => {
          if (options[j].correct) b.classList.add('correct');
        });
        cyrState.qzWrong++;
      }

      // Speak the letter
      speak(card.letter.split(' ')[0]);

      setTimeout(() => {
        cyrState.qzQueue.shift();
        if (!cyrState.qzQueue.length) buildCyrQuizQueue();
        renderCyrQuiz();
      }, 1200);
    });
  });
}

// --- MATCH ---
function buildCyrMatchRound() {
  if (!cyrState.mtPool.length) {
    cyrState.mtPool = shuffle(CYRILLIC.filter(c => c.sound !== '—').slice());
  }
  const pairs = cyrState.mtPool.splice(0, 6);
  if (!pairs.length) return;
  cyrState.mtRound = pairs;
  cyrState.mtSelected = null;
  return pairs;
}

function renderCyrMatch() {
  const content = $('cyr-content');

  if (!cyrState.mtPool.length && !cyrState.mtRound.length) {
    cyrState.mtMatched = 0;
    cyrState.mtMistakes = 0;
    cyrState.mtBusy = false;
    cyrState.mtPool = shuffle(CYRILLIC.filter(c => c.sound !== '—').slice());
  }

  const pairs = buildCyrMatchRound();
  if (!pairs || !pairs.length) {
    content.innerHTML = '<div class="match-done" style="display:block"><p>All pairs matched! Starting over...</p></div>';
    cyrState.mtPool = shuffle(CYRILLIC.filter(c => c.sound !== '—').slice());
    setTimeout(() => renderCyrMatch(), 1500);
    return;
  }

  // Create tiles: letters + sounds
  const tiles = [];
  pairs.forEach((c, i) => {
    tiles.push({ type: 'letter', text: c.letter, pairId: i });
    tiles.push({ type: 'sound', text: `"${c.sound}"`, pairId: i, letterText: c.letter.split(' ')[0] });
  });
  shuffle(tiles);

  content.innerHTML = `
    <div class="match-score">
      <div class="score-item"><div class="score-num green" id="cyr-mt-matched">${cyrState.mtMatched}</div><div class="score-label">Matched</div></div>
      <div class="score-item"><div class="score-num red" id="cyr-mt-mistakes">${cyrState.mtMistakes}</div><div class="score-label">Mistakes</div></div>
    </div>
    <div class="cyr-match-grid" id="cyr-match-grid">
      ${tiles.map((t, i) => `<button class="cyr-match-tile" data-pair="${t.pairId}" data-type="${t.type}" data-idx="${i}">
        <div>${t.type === 'letter' ? '<span class="tile-type">Letter</span>' : '<span class="tile-type">Sound</span>'}${t.text}</div>
      </button>`).join('')}
    </div>
    <div class="match-done" id="cyr-match-done" style="display:none;">
      <p>All pairs matched!</p>
      <button class="nav-btn primary" id="cyr-match-next">Next Round &#8594;</button>
    </div>
  `;

  // Tile clicks
  const grid = content.querySelector('#cyr-match-grid');
  grid.querySelectorAll('.cyr-match-tile').forEach(btn => {
    btn.addEventListener('click', () => handleCyrMatchTap(btn, tiles[parseInt(btn.dataset.idx)]));
  });

  // Next round button
  const nextBtn = content.querySelector('#cyr-match-next');
  if (nextBtn) {
    nextBtn.addEventListener('click', () => renderCyrMatch());
  }
}

function handleCyrMatchTap(btn, tile) {
  if (cyrState.mtBusy) return;
  if (btn.classList.contains('matched') || btn.classList.contains('correct')) return;

  if (cyrState.mtSelected && cyrState.mtSelected.btn === btn) {
    btn.classList.remove('selected');
    cyrState.mtSelected = null;
    return;
  }

  if (!cyrState.mtSelected) {
    btn.classList.add('selected');
    cyrState.mtSelected = { btn, tile };
    if (tile.letterText) speak(tile.letterText);
    return;
  }

  const first = cyrState.mtSelected;
  cyrState.mtBusy = true;

  if (first.tile.type === tile.type) {
    // Same type — switch selection
    first.btn.classList.remove('selected');
    btn.classList.add('selected');
    cyrState.mtSelected = { btn, tile };
    cyrState.mtBusy = false;
    if (tile.letterText) speak(tile.letterText);
    return;
  }

  // Different types — check match
  if (first.tile.pairId === tile.pairId) {
    // Correct
    first.btn.classList.add('correct');
    btn.classList.add('correct');
    cyrState.mtMatched++;

    const letterTile = tile.type === 'letter' ? tile : first.tile;
    const letterEl = tile.type === 'letter' ? btn : first.btn;
    speak(cyrState.mtRound[tile.pairId].letter.split(' ')[0]);

    if ($('cyr-mt-matched')) $('cyr-mt-matched').textContent = cyrState.mtMatched;

    setTimeout(() => {
      first.btn.classList.add('matched');
      btn.classList.add('matched');
      cyrState.mtSelected = null;
      cyrState.mtBusy = false;

      // Check if round complete
      const remaining = document.querySelectorAll('#cyr-match-grid .cyr-match-tile:not(.matched)');
      if (remaining.length === 0) {
        const done = document.querySelector('#cyr-match-done');
        if (done) done.style.display = 'block';
      }
    }, 600);
  } else {
    // Wrong
    first.btn.classList.add('wrong');
    btn.classList.add('wrong');
    cyrState.mtMistakes++;
    if ($('cyr-mt-mistakes')) $('cyr-mt-mistakes').textContent = cyrState.mtMistakes;

    setTimeout(() => {
      first.btn.classList.remove('wrong', 'selected');
      btn.classList.remove('wrong');
      cyrState.mtSelected = null;
      cyrState.mtBusy = false;
    }, 700);
  }
}

// Keyboard nav for cyrillic browse
document.addEventListener('keydown', e => {
  if (state.currentScreen === 'cyrillic' && cyrState.mode === 'browse') {
    if (e.key === 'ArrowRight' && $('cyr-next')) $('cyr-next').click();
    if (e.key === 'ArrowLeft' && $('cyr-prev')) $('cyr-prev').click();
  }
});

// ============================================================
// INIT
// ============================================================
updateMasteryBar();
renderHome();

// Service Worker for PWA offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('data:text/javascript,' + encodeURIComponent(`
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request))
    ));
  `)).catch(() => {});
}
</script>
